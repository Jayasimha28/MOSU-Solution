apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-apps-data
  namespace: default
  labels:
    app: test-apps
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 1d4de0ad-7ecc-4462-852a-47f058069a3f
    portainer-run/git-branch: main
    portainer-run/git-path: portainer-run-test-app/cka-lab2/default/test-apps.yaml
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-apps
  namespace: default
  labels:
    app: test-apps
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 1d4de0ad-7ecc-4462-852a-47f058069a3f
    portainer-run/git-branch: main
    portainer-run/git-path: portainer-run-test-app/cka-lab2/default/test-apps.yaml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-apps
  template:
    metadata:
      labels:
        app: test-apps
        managed-by: portainer-run
    spec:
      initContainers:
        - name: vibe-sync
          image: alpine/git:latest
          command:
            - sh
            - '-c'
            - >-
              git config --global http.sslVerify false && git clone --depth 1 --branch main
              https://${GIT_USERNAME}:${GIT_TOKEN}@github.com/jayasimha28/MOSU-Solution /tmp/repo && mkdir -p
              /usr/share/nginx/html && cp -r /tmp/repo/. /usr/share/nginx/html/ && rm -rf /tmp/repo
          volumeMounts:
            - name: app-data
              mountPath: /usr/share/nginx/html
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: test-apps-git-credentials
                  key: username
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: test-apps-git-credentials
                  key: token
      containers:
        - name: test-apps
          image: nginx:alpine
          command:
            - sh
            - '-c'
            - nginx -g 'daemon off;'
          workingDir: /usr/share/nginx/html
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: app-data
              mountPath: /usr/share/nginx/html
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: test-apps-data
