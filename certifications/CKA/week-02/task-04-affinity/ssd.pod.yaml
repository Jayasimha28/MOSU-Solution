apiVersion: v1
kind: Pod
metadata:
  labels:
    run: ssd-pod
  name: ssd-pod
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: disktype
            operator: In
            values:
            - ssd       
  containers:
  - image: nginx
    name: ssd-pod
  dnsPolicy: ClusterFirst
  restartPolicy: Always
